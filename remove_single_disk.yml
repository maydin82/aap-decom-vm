---
# remove_single_disk.yml
# Included per candidate disk (item) from process_single_vm.yml's loop.
# Removes the disk and deducts it from the shared run budget.
# 'when' on the include_tasks call in process_single_vm.yml already
# ensures this only runs if the disk fits the remaining budget.

- name: "Remove disk: {{ item.label }}"
  community.vmware.vmware_guest_disk:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    datacenter: "{{ vcenter_datacenter }}"
    validate_certs: false
    name: "{{ vm_record.server_name }}"
    disk:
      - state: absent
        controller_number: "{{ item.scsi_controller }}"
        unit_number: "{{ item.unit_number }}"

- name: Track this removal against the run budget
  ansible.builtin.set_fact:
    removed_disk_keys: "{{ removed_disk_keys + [item.disk_key] }}"
    budget_remaining_gb: "{{ (budget_remaining_gb | float) - (item.size_gb | float) }}"
