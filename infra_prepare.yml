---
- name: Playbook to configure ansible controller post installation
  hosts: localhost
  connection: local
  vars_files:
    - infra-prepare-vars/secrets.yaml
  
  #aap_hostname: aap.example.com
  #aap_username: admin
  #aap_password: changeme
  pre_tasks:
    - name: Include vars from platform_configs directory
      ansible.builtin.include_vars:
        dir: ./aap-configure-vars
#        ignore_files: [secrets.yml]
        extensions: ["yaml,yml"]
  roles:
    - {role: infra.aap_configuration.controller_projects, when: controller_projects is defined}
    - {role: infra.aap_configuration.controller_templates, when: controller_templates is defined}
    - {role: infra.aap_configuration.controller_credentials, when: controller_credentials is defined}
    - {role: infra.aap_configuration.controller_credential_types, when: controller_credential_types is defined}
    - {role: infra.aap_configuration.controller_credential_inventories, when: controller_credential_inventories is defined}
    - {role: infra.aap_configuration.controller_credential_hosts, when: controller_credential_hosts is defined}
