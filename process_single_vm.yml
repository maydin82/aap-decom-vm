---
# process_single_vm.yml
# Included per eligible VM (vm_record) from vm_decommission_scheduled_job.yml.
#
# Removes AS MANY qualifying disks (under max_disk_removal_gb each) from
# this VM as fit within that VM's OWN VCENTER's remaining budget this
# run. budget_remaining_gb is a dict keyed by vcenter_name - each vCenter
# gets its own max_disk_removal_gb budget, independent of every other
# vCenter. A VM from vcenter1 never affects vcenter2's budget.
#
# If ALL disks end up removed (either already gone, or removed this run),
# the VM itself is removed too - all in the same run, no waiting for a
# separate pass.
#
# Always appends a new line to the log file rather than editing history -
# the next scheduled run works from whatever this new line says.

- name: Resolve this VM's vCenter connection info from its own record (not vcenter_choice)
  ansible.builtin.set_fact:
    vm_vcenter: "{{ vcenters[vm_record.vcenter_name] }}"

- name: Initialize this vCenter's budget for the run, if not seen yet
  ansible.builtin.set_fact:
    budget_remaining_gb: "{{ budget_remaining_gb | combine({ vm_record.vcenter_name: (budget_remaining_gb[vm_record.vcenter_name] | default(max_disk_removal_gb)) }) }}"

- name: Process this VM only if its vCenter's budget isn't already used up this run
  when: (budget_remaining_gb[vm_record.vcenter_name] | float) > 0
  block:

    - name: Sort this VM's qualifying disks (smallest first, to fit as many as possible)
      ansible.builtin.set_fact:
        candidate_disks_sorted: "{{ vm_record.disks | selectattr('size_gb', '<', max_disk_removal_gb) | list | sort(attribute='size_gb') }}"
        removed_disk_keys: []

    - name: No disk on this VM fits this vCenter's remaining budget - leave it for next time
      ansible.builtin.debug:
        msg: >-
          {{ vm_record.server_name }} ({{ vm_record.vcenter_name }}): no qualifying disk fits the
          remaining {{ budget_remaining_gb[vm_record.vcenter_name] }} GB budget for this vCenter
          this run - skipping until next run.
      when: (candidate_disks_sorted | length == 0) or ((candidate_disks_sorted | first).size_gb | float) > (budget_remaining_gb[vm_record.vcenter_name] | float)

    - name: Remove each qualifying disk that still fits this vCenter's remaining budget
      ansible.builtin.include_tasks: remove_single_disk.yml
      loop: "{{ candidate_disks_sorted }}"
      loop_control:
        label: "{{ item.label }}"
      when: (budget_remaining_gb[vm_record.vcenter_name] | float) >= (item.size_gb | float)

    - name: Log the outcome for this VM (only if at least one disk was removed)
      when: removed_disk_keys | length > 0
      block:

        - name: Work out what's left on this VM after removals
          ansible.builtin.set_fact:
            remaining_disks: "{{ vm_record.disks | rejectattr('disk_key', 'in', removed_disk_keys) | list }}"

        - name: Remove the whole VM if no disks remain
          when: remaining_disks | length == 0
          block:
            - name: Remove the VM (no disks left to track)
              community.vmware.vmware_guest:
                hostname: "{{ vm_vcenter.hostname }}"
                username: "{{ vm_vcenter.username }}"
                password: "{{ vm_vcenter.password }}"
                datacenter: "{{ vm_vcenter.datacenter }}"
                validate_certs: false
                name: "{{ vm_record.server_name }}"
                state: absent

            - name: Append "vm_removed" status line
              ansible.builtin.lineinfile:
                path: "{{ log_file }}"
                line: >-
                  {{ {
                    'server_name': vm_record.server_name,
                    'original_name': vm_record.original_name,
                    'vcenter_name': vm_record.vcenter_name,
                    'datacenter': vm_record.datacenter,
                    'shutdown_date': vm_record.shutdown_date,
                    'status': 'vm_removed',
                    'disks': [],
                    'total_disk_gb': 0,
                    'needs_manual_review': false,
                    'action_date': ansible_date_time.date
                  } | to_json }}
                create: true
                insertafter: EOF

            - name: Count this VM as processed
              ansible.builtin.set_fact:
                processed_count: "{{ (processed_count | int) + 1 }}"

        - name: Log the remaining disks if the VM still has some
          when: remaining_disks | length > 0
          block:
            - name: Recompute remaining total and manual-review flag
              ansible.builtin.set_fact:
                remaining_total_gb: "{{ remaining_disks | map(attribute='size_gb') | map('float') | sum }}"
                remaining_needs_manual_review: "{{ (remaining_disks | selectattr('size_gb', '<', max_disk_removal_gb) | list | length) == 0 }}"

            - name: Append "disks_partial_removed" status line
              ansible.builtin.lineinfile:
                path: "{{ log_file }}"
                line: >-
                  {{ {
                    'server_name': vm_record.server_name,
                    'original_name': vm_record.original_name,
                    'vcenter_name': vm_record.vcenter_name,
                    'datacenter': vm_record.datacenter,
                    'shutdown_date': vm_record.shutdown_date,
                    'status': 'disks_partial_removed',
                    'disks_removed': removed_disk_keys,
                    'disks': remaining_disks,
                    'total_disk_gb': remaining_total_gb,
                    'needs_manual_review': remaining_needs_manual_review,
                    'action_date': ansible_date_time.date
                  } | to_json }}
                create: true
                insertafter: EOF

            - name: Count this VM as processed
              ansible.builtin.set_fact:
                processed_count: "{{ (processed_count | int) + 1 }}"

