---
# vm_decommission_log.yml
# Shuts a VM down, renames it with a "willberemoved-" prefix (so it's
# obvious in vCenter that it's queued for decom), gathers per-disk info
# (with a stable reference key per disk), and appends that as a JSONL
# record pushed to git.
#
# This playbook does NOT delete the VM or any disks, and does NOT decide
# how removal should happen - it only records the disk list and flags
# needs_manual_review if NONE of the disks are under 5TB (meaning the
# scheduled job, which only ever removes a single sub-5TB disk at a
# time, could never make progress on this VM automatically).
#
# A separate hourly scheduled job reads this list and does the actual
# disk-by-disk and eventual VM removal.
#
# Expects these vars to be set:
#   vm_name        : ORIGINAL name of the server being decommissioned
#   vcenter_hostname / vcenter_username / vcenter_password / vcenter_datacenter
#
# shutdown_date is NOT passed in - it's captured automatically at the
# moment the VM is shut down.

# Expects these vars to be set:
#   vm_name        : ORIGINAL name of the server being decommissioned
#   vcenter_choice : which vCenter to target (from the AAP survey) -
#                    resolves hostname/credentials/datacenter via vars.yml
#
# shutdown_date is NOT passed in - it's captured automatically at the
# moment the VM is shut down.

- name: Shut down, rename, and queue VM for decommission
  hosts: localhost
  gather_facts: true   # needed for ansible_date_time.date

  vars_files:
    - vars.yml

  tasks:

    # ---------------------------------------------------------------
    # 0. Clone the repo fresh - AAP execution environments are
    #    ephemeral, so there's no persistent clone to pull into.
    # ---------------------------------------------------------------
    - name: Build authenticated clone URL (kept out of logs)
      ansible.builtin.set_fact:
        git_repo_url_authenticated: "https://{{ github_username }}:{{ github_token }}@github.com/maydin82/{{ repo_name }}.git"
      no_log: true

    - name: Clone the repo
      ansible.builtin.git:
        repo: "{{ git_repo_url_authenticated }}"
        dest: "{{ repo_path }}"
        version: "{{ repo_branch }}"
      no_log: true

    - name: Set git identity for commits (container has none by default)
      ansible.builtin.command:
        cmd: "git config {{ item }}"
        chdir: "{{ repo_path }}"
      loop:
        - 'user.email "aap-decom-automation@yourorg.com"'
        - 'user.name "AAP Decom Automation"'
      changed_when: false

    # ---------------------------------------------------------------
    # 1. Shut the VM down (no deletion here)
    # ---------------------------------------------------------------
    - name: Shut down guest OS gracefully
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        datacenter: "{{ vcenter_datacenter }}"
        validate_certs: false
        name: "{{ vm_name }}"
        state: powered-off
      register: shutdown_result

    - name: Capture the shutdown date automatically
      ansible.builtin.set_fact:
        shutdown_date: "{{ ansible_date_time.date }}"

    # Grab the UUID before renaming so the rename/lookup is unambiguous
    # even if another VM happens to share a name transiently.
    - name: Look up VM UUID
      community.vmware.vmware_guest_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        datacenter: "{{ vcenter_datacenter }}"
        validate_certs: false
        name: "{{ vm_name }}"
      register: vm_info

    - name: Set the new (prefixed) VM name
      ansible.builtin.set_fact:
        renamed_vm_name: "{{ decom_prefix }}{{ vm_name }}"

    # ---------------------------------------------------------------
    # 2. Rename the VM in vCenter
    # ---------------------------------------------------------------
    - name: Rename VM with decommission prefix
      community.vmware.vmware_guest:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        datacenter: "{{ vcenter_datacenter }}"
        validate_certs: false
        uuid: "{{ vm_info.instance.hw_product_uuid }}"
        name: "{{ renamed_vm_name }}"
        state: present

    # ---------------------------------------------------------------
    # 3. Gather disk info under the NEW name, each disk keyed by its
    #    real VMware identifiers
    # ---------------------------------------------------------------
    - name: Gather VM disk info
      community.vmware.vmware_guest_disk_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        datacenter: "{{ vcenter_datacenter }}"
        validate_certs: false
        name: "{{ renamed_vm_name }}"
      register: vm_disk_facts

    - name: Gather VM hardware devices (need bus number, not controller_key, for later disk removal)
      community.vmware.vmware_guest_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        datacenter: "{{ vcenter_datacenter }}"
        validate_certs: false
        name: "{{ renamed_vm_name }}"
        schema: "vsphere"
        properties:
          - "config.hardware.device"
      register: vm_hw_info

    # config.hardware.device is a flat list of ALL hardware devices (disks,
    # controllers, network adapters, etc). SCSI controller devices carry a
    # 'busNumber' (0-3) that vmware_guest_disk_info does NOT expose - we
    # need it to remove a disk later, so pull it from the raw device list
    # by matching each disk's controller_key to a controller device's key.
    - name: Build controller_key -> SCSI bus number lookup from raw hardware devices
      ansible.builtin.set_fact:
        controller_bus_lookup: "{{ controller_bus_lookup | default({}) | combine({ (item.key | string): item.busNumber }) }}"
      loop: "{{ vm_hw_info.instance.config.hardware.device | default([]) }}"
      when: item.busNumber is defined
      loop_control:
        label: "{{ item.key | default('device') }}"

    # NOTE: pyVmomi's serialized field names for controller devices can
    # vary slightly by community.vmware/pyVmomi version (e.g. 'busNumber'
    # vs nested differently). If this lookup comes out empty, uncomment
    # the debug task below to inspect the raw device structure and
    # adjust the loop above accordingly.
    #
    # - name: DEBUG - inspect raw hardware device structure
    #   ansible.builtin.debug:
    #     var: vm_hw_info.instance.config.hardware.device

    - name: Build disk list with a stable reference key per disk
      ansible.builtin.set_fact:
        vm_disks: "{{ vm_disks | default([]) + [ {
            'disk_key': item.value.key,
            'unit_number': item.value.unit_number,
            'controller_key': item.value.controller_key,
            'scsi_controller': (controller_bus_lookup[item.value.controller_key | string] | int),
            'label': item.value.label,
            'size_gb': ((item.value.capacity_in_kb | int) / 1048576) | round(2)
          } ] }}"
      loop: "{{ vm_disk_facts.guest_disk_info | dict2items }}"
      loop_control:
        label: "{{ item.value.label }}"

    - name: Compute total disk size
      ansible.builtin.set_fact:
        total_disk_gb: "{{ vm_disks | map(attribute='size_gb') | map('float') | sum }}"

    # ---------------------------------------------------------------
    # 4. Flag for manual review if NO disk is under 5TB (the scheduled
    #    job can never make progress on this VM automatically - it
    #    only ever removes one disk under 5TB at a time)
    # ---------------------------------------------------------------
    - name: Flag for manual review if no disk qualifies (all disks 5TB+)
      ansible.builtin.set_fact:
        needs_manual_review: "{{ (vm_disks | selectattr('size_gb', '<', max_disk_removal_gb) | list | length) == 0 }}"

    # ---------------------------------------------------------------
    # 5. Log the record (git pull -> append JSONL line -> commit/push)
    # ---------------------------------------------------------------
    - name: Pull latest changes before appending
      ansible.builtin.command:
        cmd: git pull --rebase origin {{ repo_branch }}
        chdir: "{{ repo_path }}"
      changed_when: false

    - name: Build the decommission record
      ansible.builtin.set_fact:
        decom_record:
          server_name: "{{ renamed_vm_name }}"
          original_name: "{{ vm_name }}"
          shutdown_date: "{{ shutdown_date }}"
          status: "shutdown_pending_decom"
          disks: "{{ vm_disks }}"
          total_disk_gb: "{{ total_disk_gb }}"
          needs_manual_review: "{{ needs_manual_review }}"

    - name: Append record as a single JSON line
      ansible.builtin.lineinfile:
        path: "{{ log_file }}"
        line: "{{ decom_record | to_json }}"
        create: true
        insertafter: EOF

    - name: Stage, commit, and push the update
      block:
        - name: git add
          ansible.builtin.command:
            cmd: git add decommissioned_vms.jsonl
            chdir: "{{ repo_path }}"

        - name: git commit
          ansible.builtin.command:
            cmd: >
              git commit -m "Shutdown + renamed + queued for decom: {{ renamed_vm_name }} ({{ shutdown_date }})"
            chdir: "{{ repo_path }}"
          register: commit_result
          failed_when: false

        - name: git push
          ansible.builtin.command:
            cmd: git push origin {{ repo_branch }}
            chdir: "{{ repo_path }}"
          when: commit_result.rc == 0
          register: push_result
          retries: 3
          delay: 5
          until: push_result.rc == 0

